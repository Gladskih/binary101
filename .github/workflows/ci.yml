name: CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test (unit)
        run: npm run test:unit

  windows-authenticode-trust:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dump Windows Authenticode trust snapshot
        shell: pwsh
        run: >
          .\scripts\dump-windows-authenticode-trust.ps1
          -OutputPath .\analyzers\pe\authenticode\windows-trust-store.generated.json

      - name: Upload Windows Authenticode trust snapshot
        uses: actions/upload-artifact@v7
        with:
          name: windows-authenticode-trust
          path: analyzers/pe/authenticode/windows-trust-store.generated.json
          if-no-files-found: error

  e2e-build:
    runs-on: ubuntu-latest
    needs: [windows-authenticode-trust]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows Authenticode trust snapshot
        uses: actions/download-artifact@v8
        with:
          name: windows-authenticode-trust
          path: analyzers/pe/authenticode

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Test (e2e)
        run: npm run test:e2e

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests, e2e-build]
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
